<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Web Canvas</title>
  <meta name="description" content="#TODO">
  <meta name="viewport" content="width=device-width">
  <link href="css/common.css" rel="stylesheet">
  <link href="css/canvas.css" rel="stylesheet">
</head>

<body>
  <div id="painter">
    <div id="make-canvas">
      <input type="number" step="1" min="1" max="4096" value="50" id="width-size-input">
      <input type="number" step="1" min="1" max="4096" value="50" id="height-size-input">
      <script>
        // height, width に不正な値が入った場合修正する.
        const i1 = document.getElementById("width-size-input");
        i1.addEventListener("change", e => { if (i1.value < 1) i1.value = 1; else if (i1.value > 4096) i1.value = 4096; });
        const i2 = document.getElementById("height-size-input");
        i2.addEventListener("change", e => { if (i2.value < 1) i2.value = 1; else if (i2.value > 4096) i2.value = 4096; });
      </script>
      <button id="create-canvas">new canvas</button>
    </div>
    <div id="canvas"></div>
    <!-- コントローラーのてんぷら -->
    <template id="canvas-controller-template">
      <div class="canvas-controller">
        <form>
        <div class="color">
          <p>ブラシの設定</p>
          <div><label>色:<input type="color" class="color-input"></label></div>
          <div><label><span>透過度:</span><input type="number" step="1" min="0" max="255" class="a" value="255"></label></div>
        </div>
        <div>
          <label><span>線の太さ:</span><input type="number" min="1" class="weight" value="1"></label>
        </div>
        </form>
        <button class="undo-button">← undo</button>
        <button class="redo-button">redo →</button>
      </div>
    </template>
  </div>
  <script src="js/def.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/command.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/painter.js"></script>
  <script src="js/main.js"></script>
  <script src="js/setup.js"></script>
</body>

</html>
