<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Web Canvas</title>
  <meta name="description" content="#TODO">
  <meta name="viewport" content="width=device-width">
  <link href="css/common.css" rel="stylesheet">
</head>

<body>
  <div>
    <input type="number" step="1" min="1" max="4096" value="50" id="width-size-input">
    <input type="number" step="1" min="1" max="4096" value="50" id="height-size-input">
    <script>
      // height, width に不正な値が入った場合修正する.
      const i1=document.getElementById("width-size-input");
      i1.addEventListener("change",e=>{if(i1.value<1)i1.value=1;else if(i1.value>4096)i1.value=4096;});
      const i2=document.getElementById("height-size-input");
      i2.addEventListener("change",e=>{if(i2.value<1)i2.value=1;else if(i2.value>4096)i2.value=4096;});
    </script>
    <button id="create-canvas">new canvas</button>
  </div>
  <div id="canvas"></div>
  <script src="js/canvas.js"></script>
  <script src="js/painter.js"></script>
  <script src="js/main.js"></script>
  <script src="js/setup.js"></script>
</body>

</html>
